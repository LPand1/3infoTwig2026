{# jogosExcluir.html - isto é um comentário #}
{% extends "_base.html" %}

{% block conteudo %}
<h2>Excluir jogo</h2>
<h3>Você está excluindo o jogo {{ jogo.nome }}</h3>
<br>
Você tem certeza que deseja fazer isso? Esta
operação não pode ser desfeita. Pense em sua
família antes de confirmar.
<div>
    <form action="jogosExcluir.php" method="post">
        <input type="hidden" name="id" value="{{ jogo.id }}">
        <input type="submit" value="Apagar❌"
        style="background-color: red; font-weight: bolder;">
    </form>
    <a href="jogos.php">Cancelar</a>
</div>
{% endblock %}
